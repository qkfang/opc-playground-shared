name: 10 Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
      - ".github/workflows/10_deploy_iac.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name 'rg-playground-shared' \
            --location 'eastus2'

      - name: Deploy Bicep
        working-directory: bicep
        run: |
          az deployment group create \
            --name 'opc-shared-dev' \
            --resource-group 'rg-playground-shared' \
            --template-file './main.bicep' \
            --parameters './main.bicepparam' \
            baseName='play'
